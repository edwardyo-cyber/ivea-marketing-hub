<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes iMedia — Location</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- No login screen — uses shared auth from localStorage -->

  <!-- App Shell -->
  <div id="app-shell" class="app-shell">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <img src="logo.jpg" alt="Hermes iMedia" style="width:32px;height:32px;object-fit:contain;border-radius:6px">
        <span class="sidebar-title" id="sidebar-title">Location</span>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-bottom">
        <div class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">
          <i data-lucide="moon" class="theme-icon" id="theme-icon-dark"></i>
          <i data-lucide="sun" class="theme-icon" id="theme-icon-light" style="display:none"></i>
          <div class="theme-toggle-track"></div>
          <span id="theme-label">Dark</span>
        </div>
      </div>
      <div class="sidebar-user" id="sidebar-user"></div>
    </aside>

    <!-- Main Content -->
    <div class="main-wrapper">
      <!-- Header -->
      <header class="app-header">
        <button class="hamburger-btn" id="hamburger-btn">
          <i data-lucide="menu"></i>
        </button>
        <div class="search-bar" id="global-search">
          <i data-lucide="search"></i>
          <input type="text" placeholder='Search this location...' id="search-input">
          <div class="search-results" id="search-results"></div>
        </div>
        <div class="header-actions">
          <button class="header-btn" id="ai-btn" title="AI Assistant">
            <i data-lucide="bot"></i>
          </button>
          <button class="header-btn notification-btn" id="notification-btn" title="Notifications">
            <i data-lucide="bell"></i>
            <span class="notification-badge" id="notification-badge">0</span>
          </button>
          <div class="header-user" id="header-user"></div>
        </div>
      </header>

      <!-- Page Content -->
      <main class="page-content" id="page-content"></main>
    </div>

    <!-- AI Assistant Panel -->
    <div class="ai-panel" id="ai-panel">
      <div class="ai-panel-header">
        <h3><i data-lucide="bot"></i> AI Assistant</h3>
        <button class="ai-close-btn" id="ai-close-btn"><i data-lucide="x"></i></button>
      </div>
      <div class="ai-messages" id="ai-messages"></div>
      <div class="ai-input-area">
        <input type="text" id="ai-input" placeholder="Ask about this location...">
        <button class="btn btn-primary" id="ai-send-btn"><i data-lucide="send"></i></button>
      </div>
    </div>
    <div class="ai-overlay" id="ai-overlay"></div>

    <!-- Notification Panel -->
    <div class="notification-panel" id="notification-panel">
      <div class="notification-panel-header">
        <h3>Notifications</h3>
        <button class="btn btn-sm" id="mark-all-read">Mark all read</button>
      </div>
      <div class="notification-list" id="notification-list"></div>
    </div>
  </div>

  <!-- Modal Container -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header" id="modal-header"></div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div class="modal-overlay" id="confirm-overlay">
    <div class="modal confirm-modal" id="confirm-modal">
      <div class="modal-header" id="confirm-header"></div>
      <div class="modal-body" id="confirm-body"></div>
      <div class="modal-footer" id="confirm-footer"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="db.js"></script>
  <script src="location.js"></script>
</body>
</html>
